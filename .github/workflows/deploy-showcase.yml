name: Deploy DS Showcase

on:
  push:
    branches: [main]
    paths:
      - "ds-showcase/**"
      - ".github/workflows/deploy-showcase.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-showcase
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ds-showcase/package-lock.json
      - name: Install and build
        working-directory: ds-showcase
        run: |
          npm ci
          npm run build
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ds-showcase/dist
          commit_message: "Deploy DS showcase"
